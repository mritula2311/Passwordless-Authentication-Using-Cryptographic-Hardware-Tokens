version: '3.8'

services:
  passwordless-auth:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this}
      - RP_ID=${RP_ID:-localhost}
      - RP_NAME=${RP_NAME:-Passwordless Authentication Demo}
      - ORIGIN=${ORIGIN:-http://localhost:5000}
      - FLASK_ENV=${FLASK_ENV:-production}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Add nginx for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - passwordless-auth
    restart: unless-stopped
    profiles:
      - production